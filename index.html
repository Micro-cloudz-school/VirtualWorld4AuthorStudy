<!DOCTYPE html>

<html>

  <head>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

   <script>
  AFRAME.registerComponent('force-flat', {
    // You can adjust this factor! 
    // 1.0 = normal, 1.5 = 50% more saturated, 2.0 = double saturation, etc.
    schema: {
      saturation: { type: 'number', default: 2.0 } 
    },

    init: function () {
      this.el.addEventListener('model-loaded', () => {
        const obj3D = this.el.getObject3D('mesh');
        if (!obj3D) return;

        obj3D.traverse((node) => {
          if (node.isMesh && node.material) {
            if (Array.isArray(node.material)) {
              node.material = node.material.map(mat => this.convertToFlat(mat));
            } else {
              node.material = this.convertToFlat(node.material);
            }
          }
        });
      });
    },

    convertToFlat: function (oldMaterial) {
      // 1. Clone the original color so we don't mess up other models
      const newColor = oldMaterial.color.clone();
      
      // 2. Create a temporary object to hold HSL values
      const hsl = { h: 0, s: 0, l: 0 };
      newColor.getHSL(hsl);

      // 3. Multiply the saturation by our factor (and cap it at 1.0 maximum)
      hsl.s = Math.min(1.0, hsl.s * this.data.saturation);
      
      // 4. Apply the boosted HSL back to our color object
      newColor.setHSL(hsl.h, hsl.s, hsl.l);

      // 5. Create the flat material with our new super-saturated color
      const flatMaterial = new THREE.MeshBasicMaterial({
        map: oldMaterial.map,       
        color: newColor, // <-- Uses our vivid color!
        vertexColors: oldMaterial.vertexColors,
        transparent: oldMaterial.transparent,
        opacity: oldMaterial.opacity,
        side: oldMaterial.side
      });
      
      oldMaterial.dispose(); 
      return flatMaterial;
    }
  });
</script>

  </head>

  <body>

    <a-scene light="defaultLightsEnabled: true" radius="20000">

      <a-assets>

    <a-asset-item id="dome" src="GeodesicDome.glb"></a-asset-item>

    <a-asset-item id="earth" src="Planet.glb"></a-asset-item>

    <a-asset-item id="jupiter" src="Jupiter.glb"></a-asset-item>

    <a-asset-item id="solarpanel" src="SolarPanel.glb"></a-asset-item>

    <a-asset-item id="sattelite" src="Sattelite.glb"></a-asset-item>

    <a-asset-item id="skyboximg" src="Starmap.jpg"></a-asset-item>

  </a-assets> 

       <a-gltf-model 

    src="#dome" 

    position="0 1 10.1234" 

    rotation="0 45 0" 

    scale="0.5 0.5 0.5">

  </a-gltf-model>

     <a-gltf-model 

    src="#earth" 

    position="-302 153 -398" 

    rotation="0 45 45" 

    scale="35 35 35"

    force-flat="saturation: 6.0"

    id="earth">

  </a-gltf-model>

      <a-gltf-model 

    src="#jupiter" 

    position="302 175 398" 

    rotation="0 -45 45" 

    scale="47 47 47"

    force-flat="saturation: 6.0"

    id="jupiter">

  </a-gltf-model>

      <a-gltf-model 

    src="#solarpanel" 

    position="-13 1 10.1234" 

    rotation="0 180 0" 

    scale="5 5 5"

    id="solarpanel">

  </a-gltf-model>

      <a-gltf-model 

    src="#sattelite" 

    position="14 1 9.1234" 

    rotation="0 180 0" 

    scale="1 1 1"

    id="solarpanel">

  </a-gltf-model>

      <a-sphere position="0 0.25 -242" radius="108.25" color="#fae050" material="shader: flat"></a-sphere>

      <a-plane position="0 0 -4" rotation="-90 0 0" width="300" height="300" color="#e66430"></a-plane>

      <a-light type="directional" shadow="cast: true" color="#EEE" intensity="0.5" position="0 27 -202"></a-light>

      <a-light type="ambient" color="#FFF" intensity="0.84"></a-light>

      <a-entity light="type: hemisphere; color: #CCC; groundColor: #d6723b; intensity: 1.4"></a-entity>

      <a-sky src="#skyboximg"></a-sky>

    </a-scene>

  </body>

</html>

<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/akbartus/A-Frame-Component-Postprocessing/dist/post-processing.min.js"></script></script>
  </head>
  <body>
    <a-scene post-processing="effect: bloom;">
      <a-assets>
    <a-asset-item id="myModel" src="GeodesicDome.glb"></a-asset-item>
  </a-assets> 
       <a-gltf-model 
    src="#myModel" 
    position="0 1 -3" 
    rotation="0 45 0" 
    scale="0.5 0.5 0.5">
  </a-gltf-model>
      <a-sphere position="0 0.25 -202" radius="108.25" color="#fae050" material="shader: flat"></a-sphere>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="300" height="300" color="#e66430"></a-plane>
      <a-sky color="#000000"></a-sky>
    </a-scene>
  </body>
</html>
